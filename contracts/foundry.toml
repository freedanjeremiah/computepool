[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[rpc_endpoints]
zerog_galileo = "https://evmrpc-testnet.0g.ai"

[etherscan]
zerog_galileo = { key = "${CHAINSCAN_API_KEY}", url = "https://chainscan-galileo.0g.ai/api" }
