services:
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile
      network: host
    image: dis-com:latest
    container_name: discom-orchestrator
    command: ["orchestrator"]
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb+srv://maintainer_philix:qwertyuiop@carbonpi.hiozz58.mongodb.net/?retryWrites=true&w=majority}
      MONGODB_DB: ${MONGODB_DB:-computepool}
      # Chain
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-https://ethereum-sepolia-rpc.publicnode.com}
      USDC_ADDRESS: ${USDC_ADDRESS:-0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238}
      USDCX_ADDRESS: ${USDCX_ADDRESS:-0xb598E6C621618a9f63788816ffb50Ee2862D443B}
      COALITION_ADDRESS: ${COALITION_ADDRESS:-0x745735AaD3696B506BA7beCcA3a523dFc5537F88}
      ORCHESTRATOR_WALLET_ADDRESS: ${ORCHESTRATOR_WALLET_ADDRESS}
      # KeeperHub
      KEEPERHUB_API_KEY: ${KEEPERHUB_API_KEY}
      KEEPERHUB_BASE_URL: ${KEEPERHUB_BASE_URL:-https://app.keeperhub.com}
      KEEPERHUB_WEBHOOK_SECRET: ${KEEPERHUB_WEBHOOK_SECRET}
      KH_WORKFLOW_COALITION_FORM: ${KH_WORKFLOW_COALITION_FORM}
      KH_WORKFLOW_ACTIVATE_AND_POOL: ${KH_WORKFLOW_ACTIVATE_AND_POOL}
      KH_WORKFLOW_SET_MEMBER_UNITS: ${KH_WORKFLOW_SET_MEMBER_UNITS:-}
      KH_WORKFLOW_STREAM_START: ${KH_WORKFLOW_STREAM_START}
      KH_WORKFLOW_STREAM_STOP: ${KH_WORKFLOW_STREAM_STOP}
      KH_WORKFLOW_HANDLE_BREACH: ${KH_WORKFLOW_HANDLE_BREACH}
      # x402
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-http://facilitator:4021}
      X402_DEFAULT_PRICE_PER_TOKEN_USDC_MICRO: ${X402_DEFAULT_PRICE_PER_TOKEN_USDC_MICRO:-100}
      # Public URL for KH webhook callbacks (ngrok or similar)
      PUBLIC_URL: ${PUBLIC_URL}
    ports:
      - "8000:8000"
    networks:
      - discom
    restart: unless-stopped

  node-a:
    image: dis-com:latest
    container_name: discom-node-a
    depends_on:
      - orchestrator
    command: ["worker"]
    environment:
      NODE_ID: node-a
      WORKER_URL: http://node-a:7000
      ORCHESTRATOR_URL: http://orchestrator:8000
      MODEL_NAME: ${MODEL_NAME:-Qwen/Qwen2.5-3B-Instruct}
      PEER_HOST: node-b
      AXL_API_URL: http://localhost:9002
      OWNER_API_KEY: ${OWNER_API_KEY:-}
      WORKER_PRIVATE_KEY: ${WORKER_A_PRIVATE_KEY:-}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-https://ethereum-sepolia-rpc.publicnode.com}
    volumes:
      - node-a-data:/data
      - hf-cache:/root/.cache/huggingface
    ports:
      - "7000:7000"   # worker HTTP
      - "9002:9002"   # AXL HTTP API
      - "7001:7001"   # AXL TCP (peer transport)
    networks:
      - discom
    restart: unless-stopped

  node-b:
    image: dis-com:latest
    container_name: discom-node-b
    depends_on:
      - orchestrator
    command: ["worker"]
    environment:
      NODE_ID: node-b
      WORKER_URL: http://node-b:7000
      ORCHESTRATOR_URL: http://orchestrator:8000
      MODEL_NAME: ${MODEL_NAME:-Qwen/Qwen2.5-3B-Instruct}
      PEER_HOST: node-a
      AXL_API_URL: http://localhost:9002
      OWNER_API_KEY: ${OWNER_API_KEY:-}
      WORKER_PRIVATE_KEY: ${WORKER_B_PRIVATE_KEY:-}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-https://ethereum-sepolia-rpc.publicnode.com}
    volumes:
      - node-b-data:/data
      - hf-cache:/root/.cache/huggingface
    ports:
      - "7010:7000"   # worker HTTP (host-side remap)
      - "9012:9002"   # AXL HTTP API
      - "7011:7001"   # AXL TCP
    networks:
      - discom
    restart: unless-stopped

  facilitator:
    build:
      context: ./facilitator
      dockerfile: Dockerfile
    container_name: cp-facilitator
    environment:
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      USDC_ADDRESS: ${USDC_ADDRESS}
    ports:
      - "4021:4021"
    networks:
      - discom
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4021/health').read()"]
      interval: 5s
      timeout: 2s
      retries: 5

volumes:
  node-a-data:
  node-b-data:
  hf-cache:

networks:
  discom:
    driver: bridge
